# this workflow deploys this repositories code to a server for demo and display.
name: deploy-workflow
run-name: Deploy RELEASE files for ${{ github.event_name }} triggered by ${{ github.triggering_actor }}
concurrency:
  group: release-deploy-files

permissions:
  contents: read
  packages: read
  actions: read

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md
      - LICENSE.md
      - CHANGELOG.md # Should never be edited anyway
      - .git*
      - docs/**
  workflow_dispatch:

jobs:
  deploy-application:
    runs-on: ["self-hosted", "Windows", "X64", "fcr", "deploy"]
    steps:
      - name: prepare environment
        id: prepare-environment
        uses: ./.github/workflows/job-prepare-environment.yml

      - name: get-version
        id: get-version
        uses: ./.github/workflows/job-get-version.yml
        with:
          build-type: RELEASE
          tag-version-prefix: ""
          version-suffix: ""

      - name: send-files-to-server
        id: send-files-to-server
        uses: ./.github/workflows/job-send-files-to-server.yml

      - name: tag-repo
        id: tag-repo
        uses: ./.github/workflows/job-tag-repo.yml
        with:
          tag-string: v${{ steps.get-version.outputs.NEXT_VERSION_NUMBER }}
          build-type: RELEASE

      - name: create-release
        id: create-release
        uses: ./.github/workflows/job-create-private-release.yml
        with:
          tag-string: v${{ steps.get-version.outputs.NEXT_VERSION_NUMBER }}
          build-type: RELEASE
          version-string: ${{ steps.get-version.outputs.NEXT_VERSION_NUMBER }}
