name: send-files-to-server

on:
  workflow_call:
    secrets:
      SERVER_NETWORK_PATH:
        required: true

jobs:
  send-files-to-server:
    if: ${{ success() }}
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      # copy the application files to the web server
      - name: Copy the files to the Web Server
        id: copy-files-to-server
        shell: powershell
        run: |
          robocopy "${{ github.workspace }}\App_Data\database" "${{ secrets.SERVER_NETWORK_PATH }}\App_Data\database" /E /XN /XO /XC
          robocopy "${{ github.workspace }}\App_Data\inc_files" "${{ secrets.SERVER_NETWORK_PATH }}\App_Data\inc_files" /MIR
          robocopy "${{ github.workspace }}\asp_files" "${{ secrets.SERVER_NETWORK_PATH }}\asp_files" /MIR
          robocopy "${{ github.workspace }}\images" "${{ secrets.SERVER_NETWORK_PATH }}\images" /MIR
          robocopy "${{ github.workspace }}\styles" "${{ secrets.SERVER_NETWORK_PATH }}\styles" /MIR
          robocopy "${{ github.workspace }}" "${{ secrets.SERVER_NETWORK_PATH }}" "Default.asp"
          if ($LASTEXITCODE -lt 8) { $global:LASTEXITCODE = 0 }
